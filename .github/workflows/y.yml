run-name: ${{ github.actor }} is running tests for ${{ github.workflow }}
on: [push]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: y
      - uses: ./y/.github/actions/base
        with:
          require_gcc: true
          require_go: true
      - name: Run ${{ github.workflow }} Test
        run: make -C ${{ github.workspace }}/y/ clean test
